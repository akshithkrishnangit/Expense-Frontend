<div class="container mt-4">

  <h2 class="text-center mb-4">➕ Add Expense</h2>

  <div class="card p-4 shadow">

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input [(ngModel)]="expense.name" class="form-control" placeholder="Enter name">
    </div>

    <div class="mb-3">
      <label class="form-label">Amount</label>
      <input type="number" [(ngModel)]="expense.amount" class="form-control" placeholder="Enter amount">
    </div>

    <div class="mb-3">
      <label class="form-label">Category</label>
      <input [(ngModel)]="expense.category" class="form-control" placeholder="Enter category">
    </div>

    <div class="mb-3">
      <label class="form-label">Date</label>
      <input type="date" [(ngModel)]="expense.date" class="form-control">
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-success" (click)="addExpense()">Add Expense</button>
      <button class="btn btn-secondary" routerLink="/">Back</button>
    </div>

  </div>

</div>
